<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rosey ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Quicksand", sans-serif;
      background: linear-gradient(135deg, #1a1024, #2b1d3a, #3a2b4f);
      color: #f3eaff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ✨ Intro overlay */
    .intro {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #2b1d3a, #0a0612);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeOut 2s ease forwards;
      animation-delay: 2.5s;
    }

    .intro h1 {
      font-size: 2.5rem;
      color: #ffd6ff;
      animation: glow 1.5s infinite alternate;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ffb3ff; }
      to { text-shadow: 0 0 25px #fff; }
    }

    /* ✨ Sparkles */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: float 6s infinite ease-in-out;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 0.2; }
      50% { transform: translateY(-40px); opacity: 1; }
      100% { transform: translateY(0); opacity: 0.2; }
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2.5rem;
      text-align: center;
      max-width: 650px;
      box-shadow: 0 0 40px rgba(255, 200, 255, 0.15);
      z-index: 1;
    }

    .pfp {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid #ffc8ff;
      box-shadow: 0 0 20px rgba(255, 200, 255, 0.6);
      object-fit: cover;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 2.3rem;
      margin: 0.5rem 0;
      color: #ffd6ff;
      text-shadow: 0 0 8px rgba(255, 200, 255, 0.5);
    }

    .bio {
      font-size: 1.15rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    /* 🌸 Expandable card */
    .about {
      margin-bottom: 2rem;
      cursor: pointer;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      transition: all 0.3s;
    }

    .about:hover {
      background: rgba(255,255,255,0.1);
    }

    .about-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .about.open .about-content {
      max-height: 200px;
      margin-top: 8px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .badge {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .badge.common { box-shadow: 0 0 8px #aaa; }
    .badge.rare { box-shadow: 0 0 12px #6cf; }
    .badge.legendary { box-shadow: 0 0 18px #ff9dfc; }

    .badge:hover {
      transform: scale(1.15) rotate(3deg);
    }

    .badge img {
      width: 28px;
      height: 28px;
    }

    .tooltip {
      position: absolute;
      bottom: -30px;
      background: rgba(30, 20, 40, 0.9);
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 0.75rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .badge:hover .tooltip {
      opacity: 1;
    }

    /* 💥 Click ripple */
    .ripple {
      position: fixed;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(8);
        opacity: 0;
      }
    }

    /* ✨ Cursor sparkles */
    .trail {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #ffd6ff;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.7;
      animation: fadeTrail 0.8s forwards;
    }

    @keyframes fadeTrail {
      to { opacity: 0; transform: scale(0.5); }
    }

  </style>
</head>

<body>

<div class="intro"><h1>✨ Transforming... ✨</h1></div>

<script>
/* sparkles */
for (let i = 0; i < 25; i++) {
  const s = document.createElement("div");
  s.className = "sparkle";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(s);
}

/* cursor trail */
document.addEventListener("mousemove", e => {
  const t = document.createElement("div");
  t.className = "trail";
  t.style.left = e.clientX + "px";
  t.style.top = e.clientY + "px";
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 800);
});

/* ripple click */
document.addEventListener("click", e => {
  const r = document.createElement("div");
  r.className = "ripple";
  r.style.left = e.clientX + "px";
  r.style.top = e.clientY + "px";
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 600);
});
</script>

<div class="container">

  <img src="pfp.png" class="pfp">

  <h1>Hello hello ✨</h1>

  <div class="bio">
    I'm Rosey, a tech goblin and magical girl wannabe ☆
  </div>

  <div class="about" onclick="this.classList.toggle('open')">
    💌 About me (click)
    <div class="about-content">
      I like coding weird things, making cute UIs, and hoarding random tech knowledge like a goblin.
    </div>
  </div>

  <div class="badges" id="badgeContainer"></div>

</div>

<script>
async function loadBadges() {
  const res = await fetch("badges.json");
  const badges = await res.json();

  const container = document.getElementById("badgeContainer");

  badges.forEach(b => {
    const badge = document.createElement("div");
    badge.className = "badge " + (b.rarity || "common");

    const img = document.createElement("img");
    img.src = b.icon;

    const tooltip = document.createElement("div");
    tooltip.className = "tooltip";
    tooltip.innerText = b.name;

    badge.appendChild(img);
    badge.appendChild(tooltip);
    container.appendChild(badge);
  });
}
loadBadges();
</script>

</body>
</html>
