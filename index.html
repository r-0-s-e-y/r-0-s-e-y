<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rosey ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Quicksand", sans-serif;
      background: linear-gradient(135deg, #1a1024, #2b1d3a, #3a2b4f);
      color: #f3eaff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      max-width: 750px;
      padding: 2rem;
      text-align: center;
    }

    h2 {
      margin-top: 2rem;
      color: #ffd6ff;
    }

    .pfp {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid #ffc8ff;
      box-shadow: 0 0 20px rgba(255, 200, 255, 0.6);
      object-fit: cover;
    }

    .bio {
      margin-bottom: 1rem;
    }

    /* badges & links */
    .badges, .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    .badge {
      width: 55px;
      height: 55px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: 0.25s;
    }

    .badge:hover {
      transform: scale(1.15);
    }

    .badge img {
      width: 28px;
    }

    .tooltip {
      position: absolute;
      bottom: -28px;
      background: rgba(20,20,30,0.9);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 0.75rem;
      opacity: 0;
      transition: 0.2s;
    }

    .badge:hover .tooltip {
      opacity: 1;
    }

    /* 🎴 project cards */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 1rem;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1rem;
      text-align: left;
      transition: 0.25s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 15px rgba(255,200,255,0.3);
    }

    .card h3 {
      margin: 0;
      color: #ffd6ff;
    }

    .card p {
      font-size: 0.9rem;
      opacity: 0.85;
    }
  </style>
</head>

<body>
<div class="container">

  <img src="pfp.png" class="pfp">

  <h1>Hello hello ✨</h1>
  <div class="bio">
    I'm Rosey, a tech goblin and magical girl wannabe ☆
  </div>

  <!-- 🌸 Badges -->
  <h2>✨ Skills</h2>
  <div class="badges" id="badgeContainer"></div>

  <!-- 🔗 Links -->
  <h2>🔗 My Links</h2>
  <div class="links" id="linkContainer"></div>

  <!-- 🎴 Projects -->
  <h2>🎴 Projects</h2>
  <div class="projects" id="projectContainer"></div>

</div>

<script>
/* load skill badges */
async function loadBadges() {
  const res = await fetch("badges.json");
  const data = await res.json();
  const container = document.getElementById("badgeContainer");

  data.forEach(b => {
    const el = document.createElement("div");
    el.className = "badge";

    el.innerHTML = `
      <img src="web-assets/${b.icon}">
      <div class="tooltip">${b.name}</div>
    `;
    container.appendChild(el);
  });
}

/* load links */
async function loadLinks() {
  const res = await fetch("links.json");
  const data = await res.json();
  const container = document.getElementById("linkContainer");

  data.forEach(l => {
    const el = document.createElement("div");
    el.className = "badge";

    el.innerHTML = `
      <img src="web-assets/${l.icon}">
      <div class="tooltip">${l.name}</div>
    `;

    el.onclick = () => window.open(l.url, "_blank");
    container.appendChild(el);
  });
}

/* load projects */
async function loadProjects() {
  const res = await fetch("projects.json");
  const data = await res.json();
  const container = document.getElementById("projectContainer");

  data.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${p.name}</h3>
      <p>${p.description}</p>
    `;

    card.onclick = () => window.open(p.url, "_blank");
    container.appendChild(card);
  });
}

loadBadges();
loadLinks();
loadProjects();
</script>

</body>
</html>
